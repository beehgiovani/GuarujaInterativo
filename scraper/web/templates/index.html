<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Scraper - Review Dashboard</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/scraper_btn_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-home"></i> Property Scraper Dashboard</h1>
            <div class="stats">
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <span id="stat-pending">0</span> Pendentes
                </div>
                <div class="stat-card">
                    <i class="fas fa-check"></i>
                    <span id="stat-approved">0</span> Aprovados
                </div>
                <div class="stat-card">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span id="stat-synced">0</span> Sincronizados
                </div>
            </div>
            
            <div class="header-actions">
                <div class="control-group">
                    <label>Bairro:</label>
                    <select id="scrape-neighborhood" class="input-select">
                        <option value="">Carregando bairros...</option>
                    </select>
                    <!-- Legacy Zone Selector Hidden/Removed -->
                </div>
                <div class="control-group">
                    <label>Min Match:</label>
                    <select id="min-match-filter" class="input-select" onchange="loadPending(1)">
                        <option value="0">Todos</option>
                        <option value="50">Acima de 50%</option>
                        <option value="75" selected>Acima de 75%</option>
                        <option value="90">Acima de 90%</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Qtd:</label>
                    <input type="number" id="scrape-limit" value="5" min="1" max="50" class="input-limit">
                </div>
                <button id="btn-sync-queue" class="action-btn secondary" onclick="syncQueue()" title="Buscar novos endereços do Supabase para processamento local">
                    <span class="icon">⬇️</span> Buscar Endereços
                </button>
                <button id="btn-start-scraper" class="action-btn primary" onclick="startScraper()">
                    <span class="icon">🚀</span> Iniciar
                </button>
            </div>
        </header>
        
    <div class="container main-layout">
        <aside class="queue-sidebar">
            <h3><i class="fas fa-list-ol"></i> Próximos na Fila</h3>
            <div id="queue-list" class="queue-list">
                <div class="queue-empty">Carregando...</div>
            </div>
        </aside>

        <main class="content-area">
            <div id="status-section" class="status-section" style="display:none">
                 <div class="status-header">
                    <span id="scraper-status-text" class="status-badge running">Running...</span>
                 </div>
                 <div id="datalog-console" class="console-logs">
                    <div class="log-entry info">Ready to start...</div>
                 </div>
            </div>

            <div id="properties-container">
                <!-- Properties will load here -->
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Carregando propriedades...
                </div>
            </div>
            
            <div id="pagination-controls" class="pagination" style="display:none; margin-top: 20px; text-align: center;">
                <button id="btn-prev" class="action-btn" onclick="changePage(-1)">Previous</button>
                <span id="page-info" style="margin: 0 15px; font-weight: bold;">Page 1 of 1</span>
                <button id="btn-next" class="action-btn" onclick="changePage(1)">Next</button>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
